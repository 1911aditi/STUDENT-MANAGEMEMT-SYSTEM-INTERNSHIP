<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="container">

    <div class="card">
        <h2>Students Under Guide</h2>

        <canvas id="guideChart"></canvas>

    </div>

</div>

<script>

const ctx = document.getElementById('guideChart');

new Chart(ctx, {

type: 'bar',

data: {

labels: ['Dr. Sharma','Dr. Verma','Dr. Singh','Dr. Patel','Dr. Gupta'],

datasets: [{

label: 'Students',

data: [280,235,210,180,165],

backgroundColor: '#3b82f6',

borderRadius: 8

}]

},

options: {

responsive:true,

plugins:{

legend:{
display:false
}

},

scales:{

y:{
beginAtZero:true
}

}

}

});

</script>

</body>
</html>
